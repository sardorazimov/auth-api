name: macOS build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: make clean all

      - name: Smoke test CLI
        run: ./bin/miransas_agent --help

      - name: Check binary
        run: file ./bin/miransas_agent
