name: release provenance

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    outputs:
      digests: ${{ steps.hash.outputs.hashes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release binary
        run: make clean all

      - name: Package artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -czf dist/miransas_agent-macos.tar.gz -C bin miransas_agent

      - name: Generate subject for provenance
        id: hash
        run: |
          set -euo pipefail
          shasum -a 256 dist/miransas_agent-macos.tar.gz | base64 | tr -d '\n' > /tmp/miransas_hashes
          echo "hashes=$(cat /tmp/miransas_hashes)" >> "${GITHUB_OUTPUT}"

      - name: Upload release artifact
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/miransas_agent-macos.tar.gz --clobber

  provenance:
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v1.4.0
    with:
      base64-subjects: "${{ needs.build.outputs.digests }}"
      upload-assets: true
